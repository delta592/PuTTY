# SwiftLint for macos/**/*.swift only (see macos/scripts/run-swiftlint.sh).
# Keep the rule set small: catch force-unwraps / retain risks without
# fighting AppKit idioms.

included:
  - PuttyMacUI
  - PuTTY
  - pterm
  - puttygen
  - bridge
  - tests

excluded:
  - .build
  - build
  - DerivedData

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - join_with_trailing_separator
  - overridden_super_call
  - private_outlet
  - redundant_nil_coalescing
  - strong_iboutlet
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

disabled_rules:
  - trailing_comma
  - todo
  - file_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity
  - line_length
  # Conflicts with Swift 6 guidance for [CChar] → String (not Data).
  - optional_data_string_conversion

force_unwrapping: warning
force_cast: warning
force_try: warning

identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80

reporter: "xcode"
