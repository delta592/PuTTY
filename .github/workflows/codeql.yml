# Advanced CodeQL setup.
#
# Default setup cannot build this repo's Swift (CMake + AppKit, no Xcode
# project / Package.swift at the root). Swift uses build-mode: manual so
# CodeQL can trace a real compile.
#
# Docs:
#   https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, same cadence as the former default setup.
    - cron: '17 6 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: none
            os: ubuntu-latest
          - language: python
            build-mode: none
            os: ubuntu-latest
          - language: swift
            build-mode: manual
            os: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # Configure *before* CodeQL init so try_compile / compiler-id probes are
      # not wrapped by the tracer (otherwise configure alone is ~13 minutes).
      - name: Configure macOS GUI (untraced)
        if: matrix.build-mode == 'manual'
        run: |
          set -euo pipefail
          # CodeQL's Swift tracer wraps the build as an x86_64 process, so
          # swiftc/ld require x86_64. Building arm64 C objects then fails at
          # link with "found architecture 'arm64', required 'x86_64'". Match
          # the tracer: configure and compile the whole tree for x86_64
          # (cross-compile on arm64 runners). That also keeps NEON feature
          # tests off, avoiding -march=armv8… on an Intel target.
          brew install ninja
          cmake -S . -B build-codeql -G Ninja \
            -DPUTTY_MACOS_GUI=ON \
            -DPUTTY_MACOS_UNIVERSAL=OFF \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_BUILD_TYPE=Debug
          grep -E '^CMAKE_OSX_ARCHITECTURES:STRING=x86_64$' \
            build-codeql/CMakeCache.txt
          # Feature tests must match the Intel target (no NEON object libs).
          if grep -E '^HAVE_NEON_CRYPTO:(INTERNAL|BOOL)=1$' \
               build-codeql/CMakeCache.txt; then
            echo "error: NEON enabled under x86_64 CodeQL configure" >&2
            exit 1
          fi
          echo "NEON feature flags (expect unset/0):"
          grep -E '^HAVE_(ARM_NEON|NEON_|WMMINTRIN)' build-codeql/CMakeCache.txt \
            || true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build macOS GUI (Swift)
        if: matrix.build-mode == 'manual'
        run: |
          set -euo pipefail
          # PuTTY.app links PuttyMacUI (~90% of production Swift).
          cmake --build build-codeql --parallel --target PuTTY

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
